<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions align="end">

  <button matButton (click)="cancel()">
    Cancelar
  </button>

  <button matButton="outlined" color="warn" (click)="confirm()">
    Confirmar
  </button>

</mat-dialog-actions>
