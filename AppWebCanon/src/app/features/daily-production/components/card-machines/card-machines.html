<mat-card appearance="outlined" class="table-card">
  <mat-card-header>
    <mat-card-title>Telares</mat-card-title>
    <mat-card-subtitle>Selecciona un telar para registrar su producción diaria</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <section class="filter-table">
      <mat-form-field appearance="fill" class="filter-input">
        <mat-label>Filtrar</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Filtrar por código o nombre">
        @if (dataSourceMachines.filter){
          <button mat-icon-button matSuffix (click)="dataSourceMachines.filter = ''">
            <mat-icon>close</mat-icon>
          </button>
        }

      </mat-form-field>

    </section>

    <section class="table-wrapper">

      <table mat-table [dataSource]="dataSourceMachines" matSort>

        <!-- Code -->
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Codigo</th>
          <td mat-cell *matCellDef="let row">{{ row.code }}</td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>


        <tr mat-header-row *matHeaderRowDef="columnsMachines; sticky: true"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: columnsMachines;"
          (click)="selectMachine(row)"
          [class.row-selected]="selectedMachine()?.code === row.code">
        </tr>
        <tr *matNoDataRow>
          <td class="mat-cell no-data-cell" [attr.colspan]="columnsMachines.length">
            No hay telares registrados
          </td>
        </tr>

      </table>
    </section>
    <mat-paginator
      [pageSizeOptions]="[5, 10, 25, 100]"
      aria-label="Paginación">
    </mat-paginator>

  </mat-card-content>
</mat-card>
